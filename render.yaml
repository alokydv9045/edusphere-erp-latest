services:
  # ERP Backend API
  - type: web
    name: edusphere-erp-api
    env: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate
    startCommand: npx prisma migrate deploy && npm start
    rootDir: erp/server
    envVars:
      - key: PORT
        value: 5001
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: edusphere-erp-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: edusphere-erp-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: edusphere-erp-cache
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FAST2SMS_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ERP Frontend Client
  - type: web
    name: edusphere-erp-client
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    rootDir: erp/client
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: PORT
        value: 3001
      - key: NEXT_TELEMETRY_DISABLED
        value: 1

  # ERP Redis (for BullMQ)
  - type: keyvalue
    name: edusphere-erp-cache
    plan: free
    ipAllowList: []

  # Admin Backend API
  - type: web
    name: edusphere-admin-api
    env: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate
    startCommand: npx prisma db push && npm start
    rootDir: Admin/server
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: edusphere-admin-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_EMAIL
        value: admin@edusphere.com
      - key: ADMIN_PASSWORD
        sync: false

  # Admin Frontend Client
  - type: web
    name: edusphere-admin-client
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    rootDir: Admin/client
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: PORT
        value: 3000
      - key: NEXT_TELEMETRY_DISABLED
        value: 1

databases:
  # ERP Database
  - name: edusphere-erp-db
    plan: free
  
  # Admin Database
  - name: edusphere-admin-db
    plan: free