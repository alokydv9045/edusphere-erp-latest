services:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 🟢 ERP SYSTEM (School Portal)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  
  # ERP Backend API
  - type: web
    name: edusphere-erp-api
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    rootDir: erp/server
    envVars:
      - key: PORT
        value: 5001
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: edusphere-erp-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: edusphere-erp-cache
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: edusphere-erp-client
          property: url
      
      # ERP Specific Secrets (Sync manually)
      - key: FAST2SMS_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ERP Frontend Client
  - type: web
    name: edusphere-erp-client
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx next start -p $PORT
    rootDir: erp/client
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: edusphere-erp-api
          property: url
          suffix: /api
      - key: PORT
        value: 3001

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 🔵 ADMIN SYSTEM (Management Portal)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  # Admin Backend API
  - type: web
    name: edusphere-admin-api
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    rootDir: Admin/server
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: edusphere-admin-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: edusphere-admin-client
          property: url
      
      # Admin Specific Config
      - key: ADMIN_EMAIL
        value: admin@edusphere.com
      - key: ADMIN_PASSWORD
        sync: false # Set this in Render dashboard

  # Admin Frontend Client
  - type: web
    name: edusphere-admin-client
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx next start -p $PORT
    rootDir: Admin/client
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: edusphere-admin-api
          property: url
          suffix: /api
      - key: PORT
        value: 3000

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🛠️ INFRASTRUCTURE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

databases:
  # ERP Database
  - name: edusphere-erp-db
    plan: free
  
  # Admin Database
  - name: edusphere-admin-db
    plan: free

redis:
  # ERP Redis (for BullMQ)
  - name: edusphere-erp-cache
    plan: free
    ipAllowList: []